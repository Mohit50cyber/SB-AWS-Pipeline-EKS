version: 0.2

env:
  variables:
    AWS_REGION: ap-south-1
    REPOSITORY_URI: 792157736433.dkr.ecr.ap-south-1.amazonaws.com/mohit-kubernetes:latest
    IMAGE_REPO_NAME: mohit-kubernetes
    CONTAINER_NAME: mohit-kubernetes

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo "Installing dependencies..."
      - mvn -version

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws --version
      - aws sts get-caller-identity
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 792157736433.dkr.ecr.ap-south-1.amazonaws.com

      - echo "Setting image tag..."
      - IMAGE_TAG=$(echo $CODEBUILD_BUILD_ID | awk -F":" '{print $2}')

      - echo "Ensuring ECR repository exists..."
      - |
        aws ecr describe-repositories --repository-names $IMAGE_REPO_NAME --region $AWS_REGION || \
        aws ecr create-repository --repository-name $IMAGE_REPO_NAME --region $AWS_REGION

  build:
    commands:
      - echo "Build started on $(date)"
      - echo "Building JAR file..."
      - mvn clean install -DskipTests

      - echo "Building Docker image..."
      - docker build -t mohit-kubernetes .

      - echo "Tagging Docker image..."
      - docker tag mohit-kubernetes:latest 792157736433.dkr.ecr.ap-south-1.amazonaws.com/mohit-kubernetes:latest
      - docker tag $IMAGE_REPO_NAME:latest $REPOSITORY_URI:$IMAGE_TAG

      - echo "Docker images list:"
      - docker images

  post_build:
    commands:
      - set -e
      - echo "Pushing images"
      - docker images || exit 1
      - docker push 792157736433.dkr.ecr.ap-south-1.amazonaws.com/mohit-kubernetes:latest
      - docker push $REPOSITORY_URI:latest || exit 1

      - echo "Generating imagedefinitions.json"
      - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - target/*.jar